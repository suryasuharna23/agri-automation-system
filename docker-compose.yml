services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agri_user
      POSTGRES_PASSWORD: agri_pass
      POSTGRES_DB: agri_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agri_user -d agri_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqtt_data:/mosquitto/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      - AI_SERVICE_URL=http://ai:8001
      - MQTT_BROKER_HOST=mqtt
      - DATABASE_URL=postgresql+asyncpg://agri_user:agri_pass@postgres:5432/agri_db
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_started
      ai:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ai:
    build: ./ai
    ports:
      - "8001:8001"
    env_file: ./ai/.env
    volumes:
      - ./ai:/app
      - ai_models:/app/models/checkpoints
    command: uvicorn ai.api.inference_server:app --host 0.0.0.0 --port 8001 --reload

  frontend-web:
    build: ./frontend-web
    ports:
      - "3000:3000"
    env_file: ./frontend-web/.env.local
    depends_on:
      - backend

volumes:
  postgres_data:
  mqtt_data:
  ai_models:
